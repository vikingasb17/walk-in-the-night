<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk in the Night — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --card-front: #0f3460;
    --card-back: #1a1a3e;
    --accent: #e94560;
    --accent2: #f5a623;
    --star: #f5d76e;
    --sage: #57c5b6;
    --text: #eef2ff;
    --muted: #8892b0;
    --border: rgba(255,255,255,0.08);
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 16px 72px;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(233,69,96,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(87,197,182,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(15,52,96,0.4) 0%, transparent 80%);
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 5%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 85%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.7s ease both;
    position: relative;
    z-index: 1;
  }

  .story-tag {
    display: inline-block;
    background: rgba(233,69,96,0.15);
    border: 1px solid rgba(233,69,96,0.3);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 14px;
  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: var(--text);
    line-height: 1.1;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    margin-top: 10px;
    font-size: 13px;
  }

  .word-count-badge {
    display: inline-block;
    background: rgba(87,197,182,0.1);
    border: 1px solid rgba(87,197,182,0.25);
    color: var(--sage);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 100px;
    margin-top: 10px;
  }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 640px;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
    animation: fadeDown 0.7s 0.1s ease both;
  }

  .progress-track {
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
    height: 5px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    margin-bottom: 20px;
    animation: fadeDown 0.7s 0.15s ease both;
  }

  /* === CARD === */
  .scene {
    width: 100%;
    max-width: 560px;
    height: 400px;
    perspective: 1400px;
    cursor: pointer;
    animation: fadeUp 0.6s 0.2s ease both;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 36px;
    box-shadow: var(--shadow);
  }

  .face-front {
    background: linear-gradient(145deg, #0f3460 0%, #1a1a3e 100%);
    border: 1px solid rgba(233,69,96,0.2);
  }

  .face-back {
    background: linear-gradient(145deg, #0d1b3e 0%, #0a0a1e 100%);
    border: 1px solid rgba(87,197,182,0.2);
    transform: rotateY(180deg);
  }

  .word-emoji {
    font-size: 52px;
    margin-bottom: 14px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }

  .word-en {
    font-family: 'Lora', serif;
    font-size: 2.2rem;
    color: var(--text);
    font-weight: 700;
    text-align: center;
  }

  .transcription {
    font-size: 0.95rem;
    color: var(--accent2);
    margin-top: 8px;
    font-style: italic;
    letter-spacing: 0.5px;
    opacity: 0.9;
  }

  .flip-hint {
    position: absolute;
    bottom: 16px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .flip-hint::before, .flip-hint::after {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--border);
  }

  /* Back */
  .word-ru {
    font-family: 'Lora', serif;
    font-size: 1.8rem;
    color: var(--sage);
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }

  .story-quote-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--accent);
    margin-top: 18px;
    margin-bottom: 6px;
    font-weight: 700;
    opacity: 0.8;
  }

  .story-quote {
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    color: rgba(238,242,255,0.85);
    text-align: center;
    line-height: 1.65;
    font-style: italic;
  }

  .story-quote-ru {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    margin-top: 5px;
    line-height: 1.55;
  }

  /* Audio btn */
  .audio-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(233,69,96,0.3);
    position: absolute;
    bottom: 50px;
  }

  .audio-btn:hover { background: #c73652; transform: scale(1.04); }
  .audio-btn:active { transform: scale(0.97); }
  .audio-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .audio-btn.playing { background: var(--sage); box-shadow: 0 4px 16px rgba(87,197,182,0.3); }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    gap: 18px;
    animation: fadeUp 0.6s 0.3s ease both;
    position: relative;
    z-index: 1;
  }

  .nav-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(233,69,96,0.1);
  }

  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  .nav-counter {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    color: var(--text);
    min-width: 70px;
    text-align: center;
  }

  /* Grid */
  .section-title {
    width: 100%;
    max-width: 640px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-top: 44px;
    margin-bottom: 14px;
    animation: fadeUp 0.6s 0.4s ease both;
    position: relative;
    z-index: 1;
  }

  .grid {
    width: 100%;
    max-width: 640px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    animation: fadeUp 0.6s 0.4s ease both;
    position: relative;
    z-index: 1;
  }

  .grid-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .grid-item:hover, .grid-item.active {
    border-color: rgba(233,69,96,0.4);
    background: rgba(233,69,96,0.06);
    transform: translateY(-2px);
  }

  .grid-en { font-weight: 700; font-size: 12px; color: var(--text); }
  .grid-ru { font-size: 11px; color: var(--muted); }
  .grid-emoji { font-size: 18px; margin-bottom: 3px; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-anim {
    animation: cardIn 0.4s cubic-bezier(.4,0,.2,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<header>
  <div class="story-tag">📖 Walk in the Night · A1 Level</div>
  <h1>Story <span>Vocabulary</span></h1>
  <p>Click a card to reveal the Russian translation</p>
  <div class="word-count-badge">16 key words from the story</div>
</header>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>
<div class="progress-text" id="progressText">Card 1 of 16</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front" id="frontFace"></div>
    <div class="face face-back" id="backFace"></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
  <span class="nav-counter" id="navCounter">1 / 16</span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
</div>

<div class="section-title">All words — click to jump</div>
<div class="grid" id="wordGrid"></div>

<script>
const words = [
  {
    en: "village",
    ru: "деревня",
    transcription: "/ˈvɪlɪdʒ/",
    emoji: "🏡",
    quoteEn: "10 years ago I lived in a small village.",
    quoteRu: "10 лет назад я жила в маленькой деревне."
  },
  {
    en: "young",
    ru: "молодой / молодая",
    transcription: "/jʌŋ/",
    emoji: "🌱",
    quoteEn: "I was only 18 years old — I was young and naive.",
    quoteRu: "Мне было только 18 лет — я была молодой и наивной."
  },
  {
    en: "handsome",
    ru: "красивый",
    transcription: "/ˈhænsəm/",
    emoji: "😊",
    quoteEn: "Alex was handsome and many girls liked him.",
    quoteRu: "Алекс был красивым, и многим девушкам он нравился."
  },
  {
    en: "safe",
    ru: "безопасный",
    transcription: "/seɪf/",
    emoji: "🛡️",
    quoteEn: "My mother said: it is not safe.",
    quoteRu: "Моя мама сказала: это небезопасно."
  },
  {
    en: "to beg",
    ru: "умолять / просить",
    transcription: "/bɛɡ/",
    emoji: "🙏",
    quoteEn: "I begged her: please, Mom, I will stay with my friends.",
    quoteRu: "Я умоляла её: пожалуйста, мама, я буду с друзьями."
  },
  {
    en: "heart",
    ru: "сердце",
    transcription: "/hɑːrt/",
    emoji: "❤️",
    quoteEn: "Alex asked me to dance — my heart was beating fast.",
    quoteRu: "Алекс пригласил меня на танец — моё сердце билось быстро."
  },
  {
    en: "quiet",
    ru: "тихий / спокойный",
    transcription: "/ˈkwaɪət/",
    emoji: "🌙",
    quoteEn: "We drove around the village — it was quiet and dark.",
    quoteRu: "Мы ехали по деревне — было тихо и темно."
  },
  {
    en: "dark",
    ru: "тёмный / темно",
    transcription: "/dɑːrk/",
    emoji: "🌑",
    quoteEn: "I was alone — it was dark and cold.",
    quoteRu: "Я была одна — было темно и холодно."
  },
  {
    en: "scared",
    ru: "испуганный / напуганная",
    transcription: "/skerd/",
    emoji: "😨",
    quoteEn: "I was scared — my house was far away.",
    quoteRu: "Я была напугана — мой дом был далеко."
  },
  {
    en: "tired",
    ru: "усталый / уставшая",
    transcription: "/ˈtaɪərd/",
    emoji: "😴",
    quoteEn: "When I got home, I was tired — my feet had blisters.",
    quoteRu: "Когда я пришла домой, я была уставшей — на ногах были мозоли."
  },
  {
    en: "lesson",
    ru: "урок",
    transcription: "/ˈlesən/",
    emoji: "📚",
    quoteEn: "I learned an important lesson that night.",
    quoteRu: "Той ночью я усвоила важный урок."
  },
  {
    en: "strong",
    ru: "сильный / сильная",
    transcription: "/strɒŋ/",
    emoji: "💪",
    quoteEn: "It was hard, but it made me strong.",
    quoteRu: "Это было тяжело, но это сделало меня сильной."
  },
  {
    en: "umbrella",
    ru: "зонт",
    transcription: "/ʌmˈbrelə/",
    emoji: "☂️",
    quoteEn: "It started raining — I did not have an umbrella.",
    quoteRu: "Начался дождь — у меня не было зонта."
  },
  {
    en: "rain",
    ru: "дождь",
    transcription: "/reɪn/",
    emoji: "🌧️",
    quoteEn: "We walked in the rain — the streets were shiny and wet.",
    quoteRu: "Мы шли под дождём — улицы были блестящими и мокрыми."
  },
  {
    en: "lonely",
    ru: "одинокий / одна",
    transcription: "/ˈloʊnli/",
    emoji: "🚶‍♀️",
    quoteEn: "I walked home feeling lonely.",
    quoteRu: "Я шла домой, чувствуя себя одинокой."
  },
  {
    en: "dream",
    ru: "мечта",
    transcription: "/driːm/",
    emoji: "✨",
    quoteEn: "He wanted to travel the world — he had big dreams.",
    quoteRu: "Он хотел путешествовать по миру — у него были большие мечты."
  }
];

let current = 0;
let isFlipped = false;

function audioIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
}

function speak(text, btnId) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.88;
  const btn = btnId ? document.getElementById(btnId) : null;
  if (btn) {
    btn.classList.add('playing');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> Speaking…`;
    utt.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = audioIcon() + ' Listen';
    };
  }
  window.speechSynthesis.speak(utt);
}

function renderCard() {
  const w = words[current];
  const front = document.getElementById('frontFace');
  const back = document.getElementById('backFace');

  front.innerHTML = `
    <div class="word-emoji">${w.emoji}</div>
    <div class="word-en">${w.en}</div>
    <div class="transcription">${w.transcription}</div>
    <button class="audio-btn" id="audioFront" onclick="event.stopPropagation(); speak('${w.en}', 'audioFront')">
      ${audioIcon()} Listen
    </button>
    <div class="flip-hint">tap to flip</div>
  `;

  const safeQuote = w.quoteEn.replace(/'/g, "\\'");
  back.innerHTML = `
    <div class="word-ru">${w.ru}</div>
    <div class="transcription">${w.transcription}</div>
    <div class="story-quote-label">📖 From the story</div>
    <div class="story-quote">${w.quoteEn}</div>
    <div class="story-quote-ru">${w.quoteRu}</div>
    <button class="audio-btn" id="audioBack" onclick="event.stopPropagation(); speak('${safeQuote}', 'audioBack')">
      ${audioIcon()} Listen
    </button>
  `;

  const pct = ((current + 1) / words.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Card ${current + 1} of ${words.length}`;
  document.getElementById('navCounter').textContent = `${current + 1} / ${words.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === words.length - 1;

  document.querySelectorAll('.grid-item').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });

  document.getElementById('card').classList.add('card-anim');
  setTimeout(() => document.getElementById('card').classList.remove('card-anim'), 400);
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= words.length) return;
  window.speechSynthesis && window.speechSynthesis.cancel();
  current = next;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  setTimeout(renderCard, 50);
}

const grid = document.getElementById('wordGrid');
words.forEach((w, i) => {
  const item = document.createElement('div');
  item.className = 'grid-item' + (i === 0 ? ' active' : '');
  item.innerHTML = `<div class="grid-emoji">${w.emoji}</div><div class="grid-en">${w.en}</div><div class="grid-ru">${w.ru}</div>`;
  item.onclick = () => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    current = i;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    setTimeout(renderCard, 50);
  };
  grid.appendChild(item);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'Enter') speak(words[current].en, 'audioFront');
});

renderCard();
</script>
</body>
</html>
